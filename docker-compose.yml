version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: warungku_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    networks:
      - warungku_network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: warungku_nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - warungku_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: warungku_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory_toko
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - warungku_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: warungku_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: inventory_user
      PMA_PASSWORD: inventory_pass
    networks:
      - warungku_network
    depends_on:
      - mysql

volumes:
  mysql_data:

networks:
  warungku_network:
    driver: bridge